<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>The Walkup: A Soundtrack by SocialSoundSystem</title>
<meta name="description" content="Explore the sounds, charts, games today, scores, standings, and more."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c12;--bg2:#111420;--bg3:#181c28;
  --fg:#f0f2f8;--muted:#6b7280;--border:rgba(255,255,255,.08);
  --accent:#3dc8d4;--accent2:#f5a623;
  --radius:10px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--fg);font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}

/* ── HEADER ── */
header{
  padding:12px 32px;display:flex;align-items:center;gap:16px;
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;
  background:rgba(10,12,18,.94);backdrop-filter:blur(20px);
}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0}
.logo-img{height:30px;width:auto}
.logo-divider{width:1px;height:24px;background:var(--border)}
.logo-text{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:.06em;color:var(--fg)}
.logo-text span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.nav-btn{
  font-family:'DM Mono',monospace;font-size:.72rem;letter-spacing:.1em;text-transform:uppercase;
  padding:7px 14px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap;
}
.nav-btn:hover,.nav-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(61,200,212,.08)}
.badge{
  font-family:'DM Mono',monospace;font-size:.68rem;padding:5px 12px;
  border-radius:20px;background:rgba(61,200,212,.12);color:var(--accent);white-space:nowrap;
}
/* Hamburger */
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:8px;
  border:1px solid var(--border);border-radius:6px;background:rgba(255,255,255,.04);
  flex-shrink:0;margin-left:auto}
.hamburger span{display:block;width:20px;height:2px;background:var(--fg);border-radius:2px}
.mob-nav{display:none;position:fixed;inset:0;background:rgba(8,10,16,.97);z-index:9999;
  flex-direction:column;align-items:center;justify-content:center;gap:14px}
.mob-nav.open{display:flex}
.mob-nav-close{position:absolute;top:20px;right:20px;background:none;border:none;
  color:var(--muted);font-size:1.8rem;cursor:pointer;padding:8px}
.mob-nav .nav-btn{display:block;width:240px;text-align:center;padding:14px 0;font-size:.9rem}

/* ── LAYOUT ── */
.view{display:none}
.view.active{display:block}
main{max-width:1280px;margin:0 auto;padding:0 32px 60px}

/* ── HERO ── */
.hero{padding:48px 0 32px}
.hero-label{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent);
  letter-spacing:.25em;text-transform:uppercase;margin-bottom:12px}
h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,8vw,7rem);line-height:.95;margin-bottom:20px}
h1 em{color:var(--accent);font-style:normal}
.hero-sub{font-size:1rem;color:var(--muted);max-width:520px;line-height:1.6;margin-bottom:28px}
.stats-row{display:flex;gap:32px;flex-wrap:wrap;margin-bottom:32px}
.stat{display:flex;flex-direction:column;gap:4px}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2.4rem;color:var(--accent);line-height:1}
.stat-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted)}

/* ── LOCAL BANNER ── */
.local-banner{
  display:none;align-items:center;gap:14px;padding:14px 18px;margin-bottom:24px;
  border:1px solid var(--accent);border-radius:var(--radius);
  background:rgba(61,200,212,.06);cursor:pointer;
}
.local-lbl{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--accent);margin-bottom:3px}
.local-name{font-weight:600;font-size:1rem}
.local-meta{font-size:.75rem;color:var(--muted);margin-top:2px}

/* ── SEARCH ── */
.search-wrap{position:relative;margin-bottom:28px}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:1rem;pointer-events:none}
.search-input{
  width:100%;padding:12px 16px 12px 40px;
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  color:var(--fg);font-size:.95rem;outline:none;transition:border-color .15s;
}
.search-input:focus{border-color:var(--accent)}
.sr-panel{display:none;background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden}
.sr-head{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;
  color:var(--muted);padding:10px 16px;border-bottom:1px solid var(--border)}
.sr-row{display:flex;align-items:center;gap:12px;padding:10px 16px;
  cursor:pointer;transition:background .1s}
.sr-row:hover{background:var(--bg3)}
.sr-abbr{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;width:36px;flex-shrink:0}
.pname{font-weight:500;font-size:.88rem}
.sname-sm{font-size:.75rem;color:var(--muted)}

/* ── DIVISION FILTERS ── */
.div-filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px}
.div-btn{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  text-transform:uppercase;padding:5px 12px;border:1px solid var(--border);
  border-radius:20px;background:transparent;color:var(--muted);cursor:pointer;transition:all .15s}
.div-btn:hover,.div-btn.active{border-color:var(--accent);color:var(--accent);
  background:rgba(61,200,212,.08)}

/* ── TEAM GRID ── */
.teams-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.team-card{
  background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);
  padding:18px;cursor:pointer;transition:border-color .15s,transform .1s;
}
.team-card:hover{border-color:var(--accent);transform:translateY(-1px)}
.team-card.pinned{border-color:var(--accent);background:rgba(61,200,212,.04)}
.tc-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.tc-logo{width:40px;height:40px;object-fit:contain}
.tc-abbr{font-family:'Bebas Neue',sans-serif;font-size:1.8rem}
.tc-name{font-weight:600;font-size:.92rem}
.tc-meta{font-size:.72rem;color:var(--muted);margin-top:2px}
.tc-songs{display:flex;flex-direction:column;gap:4px;margin-top:8px}
.tc-song{font-size:.76rem;color:var(--muted)}
.tc-song strong{color:var(--fg);font-weight:500}
.tc-more{font-size:.7rem;color:var(--accent);margin-top:4px;font-family:'DM Mono',monospace}
.tc-rec{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted);
  margin-left:auto;align-self:flex-start;padding-top:2px}

/* ── TEAM DETAIL ── */
.detail-header{padding:28px 0 0}
.back-btn{display:inline-flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;
  font-size:.7rem;letter-spacing:.1em;color:var(--muted);cursor:pointer;
  text-transform:uppercase;margin-bottom:20px;background:none;border:none;padding:0}
.back-btn:hover{color:var(--fg)}
.detail-top{display:flex;align-items:center;gap:16px;margin-bottom:6px}
.detail-logo{width:56px;height:56px;object-fit:contain}
.detail-name{font-family:'Bebas Neue',sans-serif;font-size:2.4rem}
.detail-meta{font-size:.8rem;color:var(--muted);margin-bottom:20px}
.detail-rec{font-family:'DM Mono',monospace;font-size:.85rem;color:var(--accent);margin-left:auto}

/* ── ART CLOUD ── */
.art-cloud-label{font-family:'DM Mono',monospace;font-size:.62rem;letter-spacing:.15em;
  text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.art-cloud{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:24px}
.art-cloud img{width:48px;height:48px;border-radius:5px;object-fit:cover;
  cursor:pointer;opacity:.8;transition:opacity .15s,transform .15s}
.art-cloud img:hover{opacity:1;transform:scale(1.1);position:relative;z-index:2}

/* ── PLAYER ROWS ── */
.col-heads{display:grid;grid-template-columns:36px 180px 1fr 100px;
  gap:0 12px;padding:6px 12px;font-family:'DM Mono',monospace;
  font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);
  border-bottom:1px solid var(--border);margin-bottom:4px}
.prow{
  display:grid;grid-template-columns:36px 180px 1fr 100px;
  gap:0 12px;padding:9px 12px;border-radius:7px;align-items:center;
  transition:background .1s;cursor:default;
}
.prow:hover{background:var(--bg3)}
.pbtn{
  width:32px;height:32px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--accent);cursor:pointer;font-size:.8rem;
  display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;
}
.pbtn:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.pname{font-weight:500;font-size:.88rem}
.song-cell{display:flex;align-items:center;gap:8px;min-width:0}
.art-thumb{width:34px;height:34px;border-radius:4px;object-fit:cover;flex-shrink:0;
  background:var(--bg3)}
.sname{font-size:.82rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sartist{font-size:.7rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.src-col{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.src-badge{font-family:'DM Mono',monospace;font-size:.58rem;letter-spacing:.06em;
  padding:2px 7px;border-radius:4px;text-transform:uppercase}
.src-auto{background:rgba(245,166,35,.12);color:var(--accent2);border:1px solid rgba(245,166,35,.2)}
.src-manual{background:rgba(61,200,212,.1);color:var(--accent);border:1px solid rgba(61,200,212,.2)}
.upd-date{font-family:'DM Mono',monospace;font-size:.58rem;color:var(--muted)}
.more-btn{background:none;border:none;color:var(--accent);font-family:'DM Mono',monospace;
  font-size:.68rem;letter-spacing:.05em;cursor:pointer;padding:4px 12px 8px;
  opacity:.75;display:block}
.more-btn:hover{opacity:1}
.extra-songs .prow{border-left:2px solid rgba(61,200,212,.3);margin-left:4px;opacity:.85}

/* ── SECTION HEADERS ── */
.section-head{display:flex;align-items:center;gap:10px;margin-bottom:6px;padding:28px 0 12px}
.section-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.04em}
.section-sub{font-family:'DM Mono',monospace;font-size:.68rem;letter-spacing:.1em;
  color:var(--muted);text-transform:uppercase;margin-left:8px}
.live-dot{width:8px;height:8px;border-radius:50%;background:#f04040;
  animation:pulse 1.5s ease-in-out infinite;flex-shrink:0}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── GAME CARDS ── */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px}
.game-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.game-card-top{
  padding:8px 14px;background:rgba(0,0,0,.2);
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid var(--border);
}
.game-time{font-family:'DM Mono',monospace;font-size:.7rem;color:var(--accent);letter-spacing:.06em}
.game-time.live{color:#f04040;font-weight:600}
.game-tv{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
.game-body{padding:14px}
.game-team{display:flex;align-items:center;gap:10px;padding:6px 0}
.game-logo{width:34px;height:34px;object-fit:contain;flex-shrink:0}
.game-info{flex:1;min-width:0}
.game-team-name{font-weight:600;font-size:.9rem}
.away-tag{font-family:'DM Mono',monospace;font-size:.6rem;color:var(--muted);
  border:1px solid var(--border);padding:1px 5px;border-radius:3px;margin-left:6px}
.game-sp{font-size:.72rem;color:var(--muted);margin-top:1px}
.game-score{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;
  color:var(--fg);letter-spacing:.04em;flex-shrink:0}
.game-vs{text-align:center;font-family:'DM Mono',monospace;font-size:.62rem;
  color:var(--muted);letter-spacing:.15em;padding:4px 0}
.game-soundtrack{padding:10px 14px;border-top:1px solid var(--border)}
.game-st-label{font-family:'DM Mono',monospace;font-size:.6rem;letter-spacing:.12em;
  color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.game-st-row{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.game-st-abbr{font-family:'DM Mono',monospace;font-size:.62rem;color:var(--muted);width:28px;flex-shrink:0}
.game-st-arts{display:flex;gap:3px;flex-wrap:wrap}
.game-st-arts img{width:32px;height:32px;border-radius:4px;object-fit:cover;cursor:pointer;opacity:.85;transition:opacity .15s}
.game-st-arts img:hover{opacity:1}
.game-playlist-btn{
  display:inline-flex;align-items:center;gap:6px;margin-top:8px;
  font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.08em;
  padding:5px 12px;border:1px solid var(--border);border-radius:5px;
  background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;
}
.game-playlist-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ── CHARTS ── */
.chart-list{display:flex;flex-direction:column;gap:2px;max-width:760px}
.chart-row{display:flex;align-items:center;gap:14px;padding:10px 12px;
  border-radius:7px;transition:background .1s;cursor:pointer}
.chart-row:hover{background:var(--bg2)}
.chart-rank{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;
  color:var(--muted);width:36px;text-align:right;flex-shrink:0}
.chart-rank.top3{color:var(--accent)}
.chart-art{width:44px;height:44px;border-radius:5px;object-fit:cover;flex-shrink:0;background:var(--bg3)}
.chart-info{flex:1;min-width:0}
.chart-song{font-weight:500;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-artist{font-size:.75rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chart-count{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--accent);
  flex-shrink:0;text-align:right}
.chart-bar{height:2px;background:var(--accent);border-radius:2px;margin-top:3px;opacity:.4}

/* ── STANDINGS ── */
.std-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1100px}
.std-div{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.std-div-name{font-family:'DM Mono',monospace;font-size:.65rem;letter-spacing:.12em;
  text-transform:uppercase;color:var(--muted);padding:10px 14px;
  border-bottom:1px solid var(--border);background:rgba(0,0,0,.2)}
.std-row{display:flex;align-items:center;gap:8px;padding:8px 14px;
  border-bottom:1px solid var(--border);transition:background .1s;cursor:pointer}
.std-row:last-child{border-bottom:none}
.std-row:hover{background:var(--bg3)}
.std-row.leader{border-left:2px solid var(--accent)}
.std-row.wildcard{border-left:2px solid var(--accent2)}
.std-name{flex:1;font-size:.85rem;font-weight:500}
.std-rec{font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted);width:50px;text-align:right}
.std-pct{font-family:'DM Mono',monospace;font-size:.68rem;color:var(--muted);width:40px;text-align:right}

/* ── EMBED PLAYER ── */
.embed-wrap{
  position:fixed;bottom:20px;right:32px;width:340px;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:var(--radius);overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.5);
  z-index:200;display:none;
}
.embed-wrap.visible{display:block}
.embed-close{position:absolute;top:6px;right:8px;background:none;border:none;
  color:var(--muted);cursor:pointer;font-size:1.1rem;z-index:1;padding:4px}
.embed-wrap iframe{display:block;border-radius:10px}

/* ── MOBILE ── */
@media(max-width:1100px){header{padding:10px 20px}.nav-btn{padding:6px 10px;font-size:.65rem}}
@media(max-width:700px){
  header{padding:10px 14px}
  .header-right{display:none !important}
  .hamburger{display:flex !important}
  main{padding:0 14px 60px}
  .hero{padding:28px 0 20px}
  h1{font-size:clamp(2.8rem,12vw,5rem)}
  .teams-grid{grid-template-columns:1fr}
  .games-grid{grid-template-columns:1fr}
  .std-grid{grid-template-columns:1fr}
  #v-chart [style*="grid-template-columns"]{grid-template-columns:1fr !important}
  .col-heads{display:none}
  .prow{grid-template-columns:36px 1fr auto;grid-template-rows:auto auto}
  .prow .song-cell{grid-column:2;grid-row:2;margin-top:3px}
  .prow .src-col{grid-column:3;grid-row:1/3}
  .sartist{display:block !important}
  .embed-wrap{width:calc(100vw - 24px);right:12px}
}

/* ── CHART EXPAND ───────────────────────────────── */
.chart-row{cursor:pointer;border-radius:8px;padding:10px 12px;transition:background .1s}
.chart-row:hover{background:var(--bg3)}
.chart-row-inner{display:flex;align-items:center;gap:14px;width:100%}
.chart-play{width:30px;height:30px;border-radius:50%;border:1px solid var(--border);
  background:transparent;color:var(--accent);cursor:pointer;font-size:.75rem;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chart-play:hover{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.chart-players{display:none;padding:8px 0 4px 58px;border-top:1px solid var(--border);margin-top:8px}
.chart-players.open{display:block}
.chart-player-row{display:flex;align-items:center;gap:10px;padding:5px 0;font-size:.82rem}
.chart-player-row .team-logo{width:20px;height:20px;object-fit:contain;flex-shrink:0}
.chart-player-name{flex:1;font-weight:500}
.chart-player-team{font-family:'DM Mono',monospace;font-size:.65rem;color:var(--muted)}
</style>
</head>
<body>

<header>
  <a class="logo-wrap" href="/" onclick="navTo('teams');return false">
    <div class="logo-text">THE WALK<span>UP</span></div>
  </a>
  <div class="logo-divider"></div>
  <div class="header-right">
    <span class="badge" id="badge">— players</span>
    <button class="nav-btn active" id="nb-teams" onclick="navTo('teams')">Teams</button>
    <button class="nav-btn" id="nb-games" onclick="navTo('games')">Games Today</button>
    <button class="nav-btn" id="nb-chart" onclick="navTo('chart')">Charts</button>
    <button class="nav-btn" id="nb-standings" onclick="navTo('standings')">Standings</button>
  </div>
  <button class="hamburger" id="ham-btn" onclick="openMobNav()" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <nav class="mob-nav" id="mob-nav">
    <button class="mob-nav-close" onclick="closeMobNav()">&#x2715;</button>
    <button class="nav-btn" onclick="navTo('teams');closeMobNav()">Teams</button>
    <button class="nav-btn" onclick="navTo('games');closeMobNav()">Games Today</button>
    <button class="nav-btn" onclick="navTo('chart');closeMobNav()">Charts</button>
    <button class="nav-btn" onclick="navTo('standings');closeMobNav()">Standings</button>
  </nav>
</header>

<!-- EMBED PLAYER -->
<div class="embed-wrap" id="embed-wrap">
  <button class="embed-close" onclick="closeEmbed()">&#x2715;</button>
  <iframe id="spotify-embed" src="" width="340" height="152" frameborder="0"
    allow="autoplay;clipboard-write;encrypted-media;fullscreen;picture-in-picture"
    loading="lazy"></iframe>
</div>

<main>

<!-- ══ TEAMS VIEW ══════════════════════════════════════════ -->
<div class="view active" id="v-teams">
  <div class="hero">
    <div class="hero-label">&#x26BE; 2025-26 MLB Season &middot; Powered by SocialSoundSystem</div>
    <h1>THE WALKUP:<em>A SOUNDTRACK</em></h1>
    <p class="hero-sub">Explore the sounds, charts, games today, scores, standings, and more.</p>
    <div class="stats-row">
      <div class="stat"><span class="stat-num" id="st-p">—</span><span class="stat-label">Players</span></div>
      <div class="stat"><span class="stat-num">30</span><span class="stat-label">Teams</span></div>
      <div class="stat"><span class="stat-num" id="st-s">—</span><span class="stat-label">Songs</span></div>
      <div class="stat"><span class="stat-num" id="st-a">—</span><span class="stat-label">Artists</span></div>
      <div class="stat"><span class="stat-num" style="font-size:1.1rem;padding-top:6px" id="st-date">—</span><span class="stat-label">Last Updated</span></div>
    </div>

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s){ return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }
function logo(mid,sz){ return '<img class="tc-logo" style="width:'+sz+'px;height:'+sz+'px" src="https://www.mlbstatic.com/team-logos/'+mid+'.svg" onerror="this.style.display=\'none\'"/>'; }
// Cache for art URLs
var ART_CACHE={};
function artKey(p){return (p.s+'|'+p.a).toLowerCase().replace(/[^a-z0-9|]/g,'');}

function artImg(p){
  var key=artKey(p);
  var cached=ART_CACHE[key];
  var src=cached||'';
  var id='art-'+key.replace(/[^a-z0-9]/g,'').slice(0,20);
  if(!cached){
    // Lazy-fetch via iTunes
    setTimeout(function(){fetchArt(p,id);},0);
  }
  return '<img class="art-thumb" id="'+id+'" src="'+src+'" loading="lazy" onerror="this.style.opacity=0"/>';
}

var ART_FETCHING={};
function fetchArt(p,imgId){
  var key=artKey(p);
  if(ART_FETCHING[key])return;
  ART_FETCHING[key]=1;
  var q=encodeURIComponent(p.s+' '+p.a.split('·')[0].trim());
  fetch('https://itunes.apple.com/search?term='+q+'&media=music&limit=1')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.results&&d.results[0]){
        var url=d.results[0].artworkUrl100;
        ART_CACHE[key]=url;
        // Update all imgs with this key
        document.querySelectorAll('img[id="'+imgId+'"]').forEach(function(el){
          el.src=url;el.style.opacity='';
        });
        // Also update any other imgs with same art key
        document.querySelectorAll('img[data-artkey="'+key+'"]').forEach(function(el){
          el.src=url;
        });
      }
    }).catch(function(){});
}
function srcBadge(p){
  return '<span class="src-badge src-'+(p.src||'auto')+'">'+(p.src==='manual'?'Verified':'Auto')+'</span>';
}
function fmtDate(d){
  if(!d)return '';
  var parts=d.split('-');
  return ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'][parseInt(parts[1])-1]+' '+parseInt(parts[2]);
}
function uniqueNames(arr){ var s=new Set(); return arr.filter(function(p){if(s.has(p.n))return false;s.add(p.n);return true;}); }

function pRow(p){

    +'<button class="pbtn" onclick="playTrack(this,\''+sid+'\',\''+esc(p.a)+'\',\''+esc(p.s)+'\')">&#9654;</button>'
    +'<div class="pname">'+p.n+'</div>'

    +'<div style="min-width:0"><div class="sname">'+p.s+'</div>'

    +'<div class="src-col">'+srcBadge(p)+'<div class="upd-date">'+fmtDate(p.upd)+'</div></div>'
    +'</div>';
  return html;

function groupAndRender(players){
  var map={}, order=[];
  players.forEach(function(p){
    if(!map[p.n]){map[p.n]=[];order.push(p.n);}
    map[p.n].push(p);
  });
  return order.map(function(name){
    var songs=map[name];
    var first=songs[0];
    var extra=songs.slice(1);
    var sid=name.replace(/[^a-zA-Z0-9]/g,'');
    var html=pRow(first);
    if(extra.length){
      html+='<div class="extra-songs" id="xs-'+sid+'" style="display:none">'
        +extra.map(pRow).join('')+'</div>'
        +'<button class="more-btn" onclick="toggleExtra(\''+sid+'\',this)">+ '
        +extra.length+' previous song'+(extra.length>1?'s':'')+'</button>';
    }
    return html;
  }).join('');
}

function toggleExtra(id,btn){
  var el=document.getElementById('xs-'+id);
  var open=el.style.display==='block';
  el.style.display=open?'none':'block';
  var n=el.querySelectorAll('.prow').length;
  btn.textContent=open?'+ '+n+' previous song'+(n>1?'s':''):'- hide';
}

function buildArtCloud(players){
  var seen={}, unique=[];
  players.forEach(function(p){
    var k=p.id||p.s;
    if(!seen[k]){seen[k]=1;unique.push(p);}
  });
  return unique.slice(0,40).map(function(p){
    var sid=p.id||'';
    var sn=esc(p.s); var an=esc(p.a);
    return '<img src="" data-sid="'+sid+'" title="'+esc(p.n)+': '+sn+'"'
      +' onclick="playTrack(this,\''+sid+'\',\''+an+'\',\''+sn+'\')"'
      +' loading="lazy" onerror="this.style.display=\'none\'">';
  }).join('');
}

function loadArtCloud(players,tid){

// ── GAMES TODAY ──────────────────────────────────────────────────────────────
async function fetchTodayGames(){
  var grid=document.getElementById('games-grid');
  var lbl=document.getElementById('games-date-lbl');
  grid.innerHTML='<div style="color:var(--muted);font-family:\'DM Mono\',monospace;font-size:.8rem;padding:20px">Loading games...</div>';
  var now=new Date();
  var pad=function(n){return String(n).padStart(2,'0');};
  var ds=now.getFullYear()+'-'+pad(now.getMonth()+1)+'-'+pad(now.getDate());
  lbl.textContent=now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'}).toUpperCase();
  try{
    var espnDs=ds.replace(/-/g,'');
    var r=await fetch('https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/scoreboard?dates='+espnDs);
    var d=await r.json();
    var events=d.events||[];
    var games=events.map(function(ev){
      var comp=ev.competitions&&ev.competitions[0];if(!comp)return null;
      var away=comp.competitors.find(function(c){return c.homeAway==='away';});
      var home=comp.competitors.find(function(c){return c.homeAway==='home';});
      if(!away||!home)return null;
      var state=comp.status&&comp.status.type&&comp.status.type.state||'pre';
      var period=comp.status&&comp.status.period||'';
      var clock=comp.status&&comp.status.displayClock||'';
      var inningStr=state==='in'?(period?period+'th ':'')+clock:'';
      var gameDate=ev.date?new Date(ev.date).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',timeZoneName:'short'}):'';
      var timeStr=state==='in'?'LIVE · '+inningStr.trim():state==='post'?'FINAL':gameDate;
      var awayRec=away.records&&away.records[0]?away.records[0].summary:'';
      var homeRec=home.records&&home.records[0]?home.records[0].summary:'';
      return {
        awayName:away.team&&away.team.displayName,
        homeName:home.team&&home.team.displayName,
        awayScore:state!=='pre'?away.score:null,
        homeScore:state!=='pre'?home.score:null,
        awayRec:awayRec, homeRec:homeRec,
        time:timeStr, status:state,
        awayP:'TBD', homeP:'TBD'
      };
    }).filter(Boolean);
    renderGames(games);
  }catch(e){
    grid.innerHTML='<div style="color:var(--muted);padding:20px">Could not load games.</div>';
  }
}

        +'</div>';
    }).join('');
    return '<div class="chart-row" id="'+safeId+'">'      +'<div class="chart-row-inner" onclick="toggleChartRow(\''+safeId+'\')">'
      +'<div class="chart-rank'+(i<3?' top3':'')+'">'+( i+1)+'</div>'      +artImg({s:song,a:artist,id:sid})      +'<div class="chart-info"><div class="chart-song">'+song+'</div>'      +'<div class="chart-artist">'+artist+'</div>'      +'<div class="chart-bar" style="width:'+pct+'%"></div></div>'      +'<button class="chart-play" onclick="event.stopPropagation();playTrack(this,\''+sid+'\',\''+esc(artist)+'\',\''+esc(song)+'\')">&#9654;</button>'      +'<div class="chart-count">'+count+' player'+(count>1?'s':'')+'</div>'      +'</div>'      +'<div class="chart-players" id="cp-'+safeId+'">'+playerRows+'</div>'      +'</div>';  }).join('');
}

// ── STANDINGS ────────────────────────────────────────────────────────────────
async function fetchStandings(silent){
  var now=new Date();
  var dateEl=document.getElementById('std-date');
  if(dateEl) dateEl.textContent=now.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}).toUpperCase();
  try{
    // ESPN public API — open CORS, no key needed
    var urls=[
      'https://site.api.espn.com/apis/site/v2/sports/baseball/mlb/standings?group=league',
    ];
    var r=await fetch(urls[0]);
    var d=await r.json();
    // ESPN standings structure: d.children[] = leagues, .standings.entries[] = teams
    var entries=[];
    if(d.children){
      d.children.forEach(function(league){
        if(league.children){
          league.children.forEach(function(div){
            if(div.standings&&div.standings.entries){
              entries=entries.concat(div.standings.entries);
            }
          });
        }
      });
    }
    entries.forEach(function(entry){
      var name=entry.team&&entry.team.displayName;
      if(!name)return;
      var slug=teamSlug(name);
      if(!TM[slug])return;
      var stats={};
      (entry.stats||[]).forEach(function(s){stats[s.name]=s.value;});
      if(stats.wins!=null) TM[slug].w=Math.round(stats.wins);
      if(stats.losses!=null) TM[slug].l=Math.round(stats.losses);
    });
  }catch(e){console.warn('standings:',e);}
  if(CV==='teams') renderTeams();
  if(!silent) renderStandings();
}

function renderStandings(){
  var leaders=new Set();
  DIVS.forEach(function(div){
    var sorted=div.teams.map(function(tid){return TM[tid];})
      .sort(function(a,b){return (b.w/(b.w+b.l+.001))-(a.w/(a.w+a.l+.001));});
    if(sorted[0])leaders.add(sorted[0].i);
  });
  var wcAL=Object.values(TM).filter(function(t){return t.lg==='AL'&&!leaders.has(t.i);})
    .sort(function(a,b){return (b.w/(b.w+b.l+.001))-(a.w/(a.w+a.l+.001));}).slice(0,3).map(function(t){return t.i;});
  var wcNL=Object.values(TM).filter(function(t){return t.lg==='NL'&&!leaders.has(t.i);})
    .sort(function(a,b){return (b.w/(b.w+b.l+.001))-(a.w/(a.w+a.l+.001));}).slice(0,3).map(function(t){return t.i;});
  var wc=new Set(wcAL.concat(wcNL));
  var grid=document.getElementById('std-grid');
  grid.innerHTML=DIVS.map(function(div){
    var teams=div.teams.map(function(tid){return TM[tid];})
      .sort(function(a,b){return (b.w/(b.w+b.l+.001))-(a.w/(a.w+a.l+.001));});
    return '<div class="std-div">'
      +'<div class="std-div-name">'+div.name+'</div>'
      +teams.map(function(tm){
        var pct=tm.w+tm.l>0?((tm.w/(tm.w+tm.l))).toFixed(3).replace(/^0/,''):'.000';
        return '<div class="std-row'+(leaders.has(tm.i)?' leader':wc.has(tm.i)?' wildcard':'')+'" onclick="openTeam(\''+tm.i+'\')">'
          +logo(tm.mid,22)
          +'<span class="std-name">'+tm.n+'</span>'
          +'<span class="std-rec">'+tm.w+'-'+tm.l+'</span>'
          +'<span class="std-pct">'+pct+'</span>'
          +'</div>';
      }).join('')
      +'</div>';
  }).join('');
}

function haversine(la1,lo1,la2,lo2){
  var R=3958.8,dLat=(la2-la1)*Math.PI/180,dLon=(lo2-lo1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
async function pinLocalTeam(){
  var APIS=[
    function(){return fetch('https://ip-api.com/json/?fields=lat,lon').then(function(r){return r.json();}).then(function(d){if(!d.lat)throw 0;return{lat:d.lat,lng:d.lon};});},
    function(){return fetch('https://ipapi.co/json/').then(function(r){return r.json();}).then(function(d){if(!d.latitude)throw 0;return{lat:d.latitude,lng:d.longitude};});}
  ];
  var coords=null;
  for(var i=0;i<APIS.length;i++){try{coords=await APIS[i]();break;}catch(e){}}
  if(!coords)return;
  var best=null,bestDist=Infinity;
  STADIUMS.forEach(function(s){var dist=haversine(coords.lat,coords.lng,s.lat,s.lng);if(dist<bestDist){bestDist=dist;best=s.t;}});
  if(!best)return;
  _localTeam=best;
  renderTeams();
  var tm=TM[best];
  var b=document.getElementById('local-banner');
  b.style.display='flex';
  b.innerHTML=logo(tm.mid,38)
    +'<div style="flex:1;min-width:0">'
    +'<div class="local-lbl">&#128205; Your Local Team</div>'
    +'<div class="local-name">'+tm.n+'</div>'
    +'<div class="local-meta">'+uniqueNames(P.filter(function(p){return p.t===best;})).length+' players tracked &bull; '+tm.w+'-'+tm.l+'</div>'
    +'</div>'
    +'<div style="font-family:\'Bebas Neue\',sans-serif;font-size:1.4rem;color:'+tm.c+';opacity:.8">'+tm.ab+'</div>';
}

// ── URL ROUTING ───────────────────────────────────────────────────────────────
window.addEventListener('popstate',function(e){
  var s=e.state;
  if(s&&s.view==='detail'&&s.team){openTeam(s.team);}
  else if(s&&s.view){navTo(s.view);}
  else{initRoute();}
});

function initRoute(){
  try{
    var p=location.pathname||'/';
    var tm=p.match(/^\/teams\/([a-z]+)$/);
    if(tm&&TM[tm[1]]){openTeam(tm[1]);return;}
    var v=p==='/'||p===''?'teams':p==='/games'?'games':p==='/charts'?'chart':p==='/standings'?'standings':'teams';
    navTo(v);
  }catch(e){
    navTo('teams');
  }
}

// ── STARTUP ───────────────────────────────────────────────────────────────────
function startup(){
  buildDivFilters();
  fetchStandings(true);
  initRoute();
  pinLocalTeam();
}
if(document.readyState==='loading'){
  document.addEventListener('DOMContentLoaded', startup);
} else {
  startup();
}
